## refrence : https://namileriblog.com/terminal/starship_2025/
##		https://starship.rs/presets/nerd-font

# settings ######################################
command_timeout = 1000


format = """
$os\
$sudo\
$custom\
$direnv\
$directory\
$git_branch\
$git_state\
$git_status\
$git_metrics\
$fill\
$conda\
$python\
$lua\
$rust\
\n$character\
"""

right_format = """
$cmd_duration\
$time\
"""

###########################################
[os.symbols]
Macos =		" ÔÖĻ "
Linux =		" ůįĆĹ "
Ubuntu =	" ÔĆõ "
Debian =	" ÔĆÜ "
AlmaLinux =	" ÔĆĚ "
Arch =		" ÔĆÉ "
Windows =	" ůįć≤ "

###########################################
[os]
disabled = false
format = """
[Óāļ](fg:#89b4fa)\
[$symbol]($style)\
[Óāľ](fg:#89b4fa)\
"""
style = "fg:#313244 bg:#89b4fa"

[sudo]
disabled = false
symbol = ' ůįŅÜ sudo'
format = """
[Óāļ](fg:#eba0ac)\
[$symbol]($style)\
[Óāľ](fg:#eba0ac)\
"""
style = "bold fg:#313244 bg:#eba0ac "


[direnv]
disabled = false
format = """
[Óāļ](fg:#89dceb)\
[$symbol$allowed]($style)\
[Óāľ](fg:#89dceb)\
"""
style = "bold fg:#313244 bg:#89dceb"


[directory]
truncation_length = 3
truncation_symbol = 'ÔĀľ '
truncate_to_repo = false
fish_style_pwd_dir_length = 1
home_symbol = ' ůįčě ~ '
read_only = ' ůįĆĺ '
format = """
[Óāļ](fg:#b4befe)\
[$path]($style)\
[$read_only]($read_only_style)\
[Óāľ](fg:#b4befe)\
"""
style = 'bold fg:#313244 bg:#b4befe'
read_only_style = 'bold fg:#313244 bg:#b4befe'

[git_branch]
symbol = ' ÔĄ¶ '
truncation_length = 20
truncation_symbol = ''
style = 'bold fg:#89dceb bg:#45475a'
format = """
[Óāļ](fg:#45475a)\
[$symbol$branch(:$remote_branch) ]($style)\
"""

[git_status]
disabled = false
style = 'bold fg:#eba0ac bg:#45475a'
conflicted = '='
ahead = '‚á°${count}'
behind = '‚á£${count}'
diverged = '‚áē'
up_to_date = '‚úď'
untracked = '?'
stashed = '$'
modified = '!${count}'
renamed = '¬Ľ'
deleted = '‚úė'
format = """
[ÓāĽ ÓłĹ ](fg:#89dceb bg:#45475a)\
[$all_status$ahead_behind ]($style)\
"""

[git_metrics]
disabled = false
added_style = 'bold fg:#a6e3a1 bg:#45475a'
deleted_style = 'bold fg:#89b4fa  bg:#45475a'
format = """
[ÓāĽ ÔĎÄ ](fg:#89dceb bg:#45475a)\
[+$added]($added_style)[-$deleted]($deleted_style)[Óāľ](fg:#45475a)\
"""

[fill]
symbol = '‚ĒÄ'
style = 'fg:#89b4fa) bg:none'


[python]
pyenv_version_name = false
symbol = '[Óúľ ](fg:#f9e2af bg:#8093fd)'
format = '[Óāļ](fg:#8093fd)[ ${symbol}${pyenv_prefix}(${version})(\($virtualenv\))]($style)[Óāľ](fg:#8093fd)'
style = 'bold fg:#313244 bg:#8093fd'


[rust]
symbol = "[ůĪėó ](fg:#e64553 bg:#eba0ac)"
format = '[Óāļ](fg:#eba0ac)[ ${symbol}(${version})]($style)[Óāľ](fg:#eba0ac)'
style = 'bold fg:#313244 bg:#eba0ac'

[cmd_duration]
show_milliseconds = true
min_time = 100
format = '[ůįěĆ $duration  ](fg:#f9e2af)'

[time]
disabled = false
format = '[Ôźļ $time](bold fg:#6c7086)'
time_format = '%T'

[character]
success_symbol = "[‚ĚĮ](bold #74c7ec)[‚ĚĮ](bold #b4befe)[‚ĚĮ](bold #89b4fa)"
error_symbol = "[‚ĚĮ](bold #eba0ac)[‚ĚĮ](bold #f38ba8)[‚ĚĮ](bold #f17497)"
